[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin"]

# Daily cron: poll NYC Open Data and send digest emails at 7am ET
[[scheduled-functions]]
  name = "poll-permits"
  schedule = "0 12 * * *"
